services:
  # Backend API
  - type: web
    name: nexasoul-quiz-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: DATABASE_URL
        fromDatabase:
          name: nexasoul-db
          property: connectionString

      - key: ADMIN_SECRET
        value: nexasoul-admin-2026

      - key: CLIENT_URL
        value: https://nexasoul-srujana.onrender.com

  # Frontend
  - type: web
    name: nexasoul-srujana
    env: static
    rootDir: client
    buildCommand: npm install --production=false && VITE_API_URL=https://nexasoul-quiz-api.onrender.com/api npm run build
    staticPublishPath: dist

databases:
  - name: nexasoul-db
    databaseName: nexasoul_quiz
    plan: free
